name: Merge Videos

on:
  workflow_dispatch:
    inputs:
      video_url_1:
        description: 'Video URL 1'
        required: true
      video_url_2:
        description: 'Video URL 2'
        required: true
      video_url_3:
        description: 'Video URL 3'
        required: true
      mood:
        description: 'BGM mood (tension or warm)'
        required: true
        default: 'tension'
      webhook_url:
        description: 'Webhook URL to notify when done'
        required: true

jobs:
  merge:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: pip install requests

      - name: Install ffmpeg
        run: sudo apt-get install -y ffmpeg

      - name: Run merge.py
        env:
          VIDEO_URL_1:        ${{ github.event.inputs.video_url_1 }}
          VIDEO_URL_2:        ${{ github.event.inputs.video_url_2 }}
          VIDEO_URL_3:        ${{ github.event.inputs.video_url_3 }}
          MOOD:               ${{ github.event.inputs.mood }}
          WEBHOOK_URL:        ${{ github.event.inputs.webhook_url }}
          GITHUB_TOKEN:       ${{ secrets.GITHUB_TOKEN }}
          GITHUB_REPOSITORY:  ${{ github.repository }}
          GITHUB_RUN_ID:      ${{ github.run_id }}
        run: python merge.py
