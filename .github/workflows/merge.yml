name: Merge Video Audio

on:
  workflow_dispatch:
    inputs:
      video_url_1:
        description: 'Video URL - Shot 1'
        required: true
      video_url_2:
        description: 'Video URL - Shot 2'
        required: true
      video_url_3:
        description: 'Video URL - Shot 3'
        required: true

jobs:
  merge:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v3

      - name: Install FFmpeg
        run: |
          sudo apt-get update
          sudo apt-get install -y --fix-missing ffmpeg

      - name: Install Python dependencies
        run: pip install requests

      - name: Run merge script
        env:
          VIDEO_URL_1: ${{ github.event.inputs.video_url_1 }}
          VIDEO_URL_2: ${{ github.event.inputs.video_url_2 }}
          VIDEO_URL_3: ${{ github.event.inputs.video_url_3 }}
        run: python merge.py

      - name: Upload output
        uses: actions/upload-artifact@v4
        with:
          name: output-video
          path: output.mp4
