name: Merge Video Audio

on:
  workflow_dispatch:
    inputs:
      video_url_1:
        description: 'Video URL - Shot 1'
        required: true
      video_url_2:
        description: 'Video URL - Shot 2'
        required: true
      video_url_3:
        description: 'Video URL - Shot 3'
        required: true
      webhook_url:
        description: 'Make.com Webhook URL to notify on completion'
        required: true

jobs:
  merge:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v3

      - name: Install FFmpeg
        run: |
          sudo apt-get update
          sudo apt-get install -y --fix-missing ffmpeg

      - name: Install Python dependencies
        run: pip install requests

      - name: Run merge script
        env:
          VIDEO_URL_1: ${{ github.event.inputs.video_url_1 }}
          VIDEO_URL_2: ${{ github.event.inputs.video_url_2 }}
          VIDEO_URL_3: ${{ github.event.inputs.video_url_3 }}
          WEBHOOK_URL: ${{ github.event.inputs.webhook_url }}
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GITHUB_REPOSITORY: ${{ github.repository }}
          GITHUB_RUN_ID: ${{ github.run_id }}
        run: python merge.py
